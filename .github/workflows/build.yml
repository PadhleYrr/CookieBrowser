name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node (for Capacitor CLI) ───────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install Capacitor deps ─────────────────────────────────
      - name: Install npm dependencies
        run: npm install --no-package-lock

      # ── 5. Capacitor sync (copies web → android/app/src/main/assets) ─
      - name: Capacitor sync
        run: npx cap sync android

      # ── 6. Gradle cache ───────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}

      # ── 7. Make gradlew executable ────────────────────────────────
      - name: Fix gradlew permissions
        run: chmod +x android/gradlew

      # ── 8. Build debug APK ────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 9. Upload APK as artifact ─────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CookieGrabber-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 10. (Optional) Create GitHub Release on tag push ──────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
