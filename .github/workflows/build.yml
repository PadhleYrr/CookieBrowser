name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: |
          if [ ! -f "android/gradlew" ]; then
            echo "gradlew not found, regenerating android platform..."
            # Back up custom Java files
            mkdir -p /tmp/android-backup/com/cookiegrabber/app
            cp android/app/src/main/java/com/cookiegrabber/app/CookieBridge.java /tmp/android-backup/com/cookiegrabber/app/
            cp android/app/src/main/java/com/cookiegrabber/app/MainActivity.java /tmp/android-backup/com/cookiegrabber/app/
            # Remove partial folder and regenerate cleanly
            rm -rf android
            npx cap add android
            # Restore custom files
            cp /tmp/android-backup/com/cookiegrabber/app/CookieBridge.java android/app/src/main/java/com/cookiegrabber/app/
            cp /tmp/android-backup/com/cookiegrabber/app/MainActivity.java android/app/src/main/java/com/cookiegrabber/app/
          else
            echo "android platform already set up, skipping cap add"
          fi

      - name: Capacitor sync
        run: npx cap sync android

      - name: Fix gradlew permissions
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CookieGrabber-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
